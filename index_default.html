<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEOYA CAPITAL — Maintenance</title>
    <meta name="description" content="DEOYA CAPITAL est actuellement en maintenance. Nous serons bientôt de retour.">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://deoya-capital.com/">
    <meta property="og:title" content="DEOYA CAPITAL — Maintenance">
    <meta property="og:description" content="DEOYA CAPITAL est actuellement en maintenance. Nous serons bientôt de retour.">
    <meta property="og:image" content="https://deoya-capital.com/deoay-capital.png">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://deoya-capital.com/">
    <meta property="twitter:title" content="DEOYA CAPITAL — Maintenance">
    <meta property="twitter:description" content="DEOYA CAPITAL est actuellement en maintenance. Nous serons bientôt de retour.">
    <meta property="twitter:image" content="https://deoya-capital.com/deoay-capital.png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/deoya-capital-vert-mini-o.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/deoya-capital-vert-mini-o.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/deoya-capital-vert-mini.png">
    
    <!-- Theme -->
    <meta name="theme-color" content="#081833">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --background: #ffffff;
            --foreground: #2D2D2D;
            --primary: #081833;
            --primary-foreground: #ffffff;
            --secondary: #F9F9F9;
            --secondary-foreground: #2D2D2D;
            --muted: #F9F9F9;
            --muted-foreground: #6B7280;
            --accent: #DF585E;
            --accent-foreground: #ffffff;
            --border: #E5E7EB;
            --gold: #C9A96E;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--background);
            color: var(--foreground);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 600px;
            text-align: center;
            animation: fade-up 0.7s ease-out forwards;
        }

        .logo {
            width: 200px;
            height: auto;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .subtitle {
            font-size: 1.25rem;
            color: var(--muted-foreground);
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .message {
            background-color: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .message p {
            color: var(--foreground);
            margin-bottom: 1rem;
        }

        .message p:last-child {
            margin-bottom: 0;
        }

        .contact-info {
            font-size: 0.9rem;
            color: var(--muted-foreground);
        }

        .contact-info a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .contact-info a:hover {
            color: #B8464C;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .subtitle {
                font-size: 1.1rem;
            }
            
            .message {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo -->
        <img src="/deoay-capital.png" alt="DEOYA CAPITAL" class="logo">
        
        <!-- Titre -->
        <h1>DEOYA CAPITAL</h1>
        
        <!-- Sous-titre -->
        <p class="subtitle">Maintenance en cours</p>
        
        <!-- Message de maintenance -->
        <div class="message">
            <p>Nous effectuons actuellement une maintenance pour améliorer nos services.</p>
            <p>Nous serons de retour très prochainement. Merci de votre patience.</p>
        </div>
        
        <!-- Spinner animation -->
        <div class="spinner"></div>
        
        <!-- Informations de contact -->
        <div class="contact-info">
            <p>Pour toute urgence, contactez-nous à :</p>
            <p><a href="mailto:contact@deoya-capital.com">contact@deoya-capital.com</a></p>
            <p><a href="tel:+33612345678">+33 6 12 34 56 78</a></p>
        </div>
    </div>
</body>
</html>
